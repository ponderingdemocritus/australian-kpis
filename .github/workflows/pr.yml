name: Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_RUSTC_WRAPPER: sccache
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"
  SCCACHE_CACHE_SIZE: 2G

jobs:
  rust-check:
    name: Rust Compile
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Compile workspace
        run: cargo check --workspace --locked

  typescript:
    name: TypeScript Typecheck and Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: ./.github/actions/setup-node

      - name: Typecheck TypeScript packages
        run: pnpm turbo run typecheck --cache-dir=.turbo

      - name: Test TypeScript packages
        run: pnpm turbo run test --cache-dir=.turbo

  lint-format:
    name: Lint and Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Set up Node.js
        uses: ./.github/actions/setup-node

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Lint Rust workspace
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Lint TypeScript and Markdown
        run: pnpm run lint

  openapi:
    name: OpenAPI Drift and Breaking Diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Install oasdiff
        run: go install github.com/oasdiff/oasdiff@v1.15.0

      - name: Generate OpenAPI document
        run: |
          set -euo pipefail
          mkdir -p target/openapi
          cargo run -p au-kpis-openapi > target/openapi/openapi.json

      - name: Check committed OpenAPI is current
        run: |
          set -euo pipefail
          jq -S . openapi.json > target/openapi/committed-normalized.json
          jq -S . target/openapi/openapi.json > target/openapi/generated-normalized.json
          git diff --no-index --exit-code \
            target/openapi/committed-normalized.json \
            target/openapi/generated-normalized.json

      - name: Compare against base branch OpenAPI
        run: |
          set -euo pipefail
          git show "origin/${{ github.event.pull_request.base.ref }}:openapi.json" > target/openapi/base-openapi.json
          oasdiff breaking target/openapi/base-openapi.json target/openapi/openapi.json

  supply-chain:
    name: Supply Chain and Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Set up Node.js
        uses: ./.github/actions/setup-node

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Check Rust dependency policy
        continue-on-error: true
        run: cargo deny check

      - name: Audit Rust advisories
        continue-on-error: true
        run: cargo audit

      - name: Audit pnpm dependencies
        continue-on-error: true
        run: pnpm audit --audit-level critical

      - name: Scan repository for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  container-security:
    name: Container Build and Trivy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/au-kpis-api.Dockerfile
          target: runtime
          tags: au-kpis-api:pr
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan API image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: au-kpis-api:pr
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AU_KPIS_CONTRACT_ADDR: 127.0.0.1:38081
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Set up Node.js
        uses: ./.github/actions/setup-node

      - name: Build SDK packages
        run: pnpm turbo run build --cache-dir=.turbo

      - name: Start smoke server
        run: |
          set -euo pipefail
          mkdir -p target/smoke
          cargo run -p au-kpis-api-http --example contract_server > target/smoke/server.log 2>&1 &
          echo $! > target/smoke/server.pid

      - name: Wait for API readiness
        run: |
          set -euo pipefail
          for _ in $(seq 1 120); do
            if curl -fsS "http://${AU_KPIS_CONTRACT_ADDR}/v1/health" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Smoke server did not become ready" >&2
          cat target/smoke/server.log >&2 || true
          exit 1

      - name: Run curl smoke checks
        run: |
          set -euo pipefail
          curl -fsS "http://${AU_KPIS_CONTRACT_ADDR}/v1/health" | jq -e '.status == "ok"'
          curl -fsS "http://${AU_KPIS_CONTRACT_ADDR}/v1/openapi.json" | jq -e '.openapi'

      - name: Run SDK smoke check
        run: |
          node --input-type=module <<'JS'
          import { createClient } from './packages/sdk/dist/client.js'

          const client = createClient({ baseUrl: `http://${process.env.AU_KPIS_CONTRACT_ADDR}` })
          const health = await client.health()
          if (health.status !== 'ok') {
            throw new Error(`unexpected health status: ${health.status}`)
          }
          await client.openapi()
          JS

      - name: Stop smoke server
        if: always()
        run: |
          set -euo pipefail
          if [ -f target/smoke/server.pid ]; then
            kill "$(cat target/smoke/server.pid)" || true
          fi

  bench:
    name: Bench Advisory
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Check workspace bench targets
        run: cargo check --workspace --benches --locked

      - name: Install critcmp
        run: cargo install critcmp --locked

      - name: Capture main benchmark baseline
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          set -euo pipefail
          pr_sha="$(git rev-parse HEAD)"
          git fetch --depth=1 origin "${BASE_REF}"
          git checkout --detach FETCH_HEAD
          cargo bench -p au-kpis-domain --bench observation_json -- --save-baseline main
          git checkout --detach "${pr_sha}"

      - name: Run advisory benchmark comparison
        run: |
          set -euo pipefail
          cargo bench -p au-kpis-domain --bench observation_json -- --save-baseline pr
          if find target/criterion -path '*/base/main' -type d | grep -q .; then
            critcmp main pr --threshold 5
          else
            echo "No main benchmark baseline exists yet; skipping advisory critcmp comparison for the first bench scaffold."
          fi

  nextest:
    name: Rust Tests (nextest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Install cargo-nextest
        run: cargo install cargo-nextest --version 0.9.100 --locked

      - name: Run workspace tests with CI profile
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/nextest
          cargo nextest run --workspace --profile ci 2>&1 | tee target/nextest/ci-run.log
          if grep -n "FLAKY" target/nextest/ci-run.log; then
            echo "Flaky retries are not allowed in CI." >&2
            exit 1
          fi

  coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      COVERAGE_RUST_TOOLCHAIN: nightly-2025-10-01
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Install nightly Rust toolchain
        run: rustup toolchain install "$COVERAGE_RUST_TOOLCHAIN" --profile minimal --no-self-update

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --version 0.6.21 --locked

      - name: Install cargo-nextest
        run: cargo install cargo-nextest --version 0.9.100 --locked

      - name: Generate LCOV report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/llvm-cov
          cargo +"$COVERAGE_RUST_TOOLCHAIN" llvm-cov clean --workspace
          cargo +"$COVERAGE_RUST_TOOLCHAIN" llvm-cov nextest \
            --workspace \
            --profile ci \
            --skip-functions \
            --branch \
            --lcov \
            --output-path target/llvm-cov/lcov.info \
            --fail-under-lines 80

      - name: Enforce branch coverage floor
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          brf = 0
          brh = 0

          for line in Path("target/llvm-cov/lcov.info").read_text().splitlines():
              if line.startswith("BRF:"):
                  brf += int(line[4:])
              elif line.startswith("BRH:"):
                  brh += int(line[4:])

          if brf == 0:
              raise SystemExit("No branch coverage data found in LCOV output")

          branch_coverage = (brh / brf) * 100
          print(f"Total branch coverage: {branch_coverage:.2f}% ({brh}/{brf})")
          if branch_coverage < 70:
              raise SystemExit(
                  f"Branch coverage below threshold: {branch_coverage:.2f}% < 70.00%"
              )
          PY

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: target/llvm-cov/lcov.info
          flags: rust
          name: rust-nextest
          use_oidc: true
          fail_ci_if_error: false

  contract:
    name: Contract (schemathesis)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AU_KPIS_CONTRACT_ADDR: 127.0.0.1:38080
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Schemathesis
        run: python -m pip install "schemathesis==4.15.2" "jsonschema==4.25.1"

      - name: Start contract server
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/contract
          cargo run -p au-kpis-api-http --example contract_server > target/contract/server.log 2>&1 &
          echo $! > target/contract/server.pid

      - name: Wait for API readiness
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 120); do
            if curl -fsS "http://${AU_KPIS_CONTRACT_ADDR}/v1/health" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Contract server did not become ready" >&2
          cat target/contract/server.log >&2 || true
          exit 1

      - name: Export OpenAPI schema
        run: cargo run -p au-kpis-openapi > target/contract/openapi.json

      - name: Validate live OpenAPI response
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "http://${AU_KPIS_CONTRACT_ADDR}/v1/openapi.json" > target/contract/live-openapi.json
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema.validators import Draft202012Validator

          schema = json.loads(
              Path("crates/au-kpis-openapi/tests/fixtures/openapi-3.1-schema.json").read_text()
          )
          document = json.loads(Path("target/contract/live-openapi.json").read_text())
          Draft202012Validator(schema).validate(document)
          PY

      - name: Run Schemathesis
        run: |
          schemathesis run \
            --checks all \
            --request-timeout 5 \
            --max-examples 16 \
            --include-path /v1/health \
            --include-path /v1/openapi.json \
            --url "http://${AU_KPIS_CONTRACT_ADDR}" \
            target/contract/openapi.json

      - name: Stop contract server
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f target/contract/server.pid ]; then
            kill "$(cat target/contract/server.pid)" || true
          fi

  snapshots:
    name: Snapshot Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Install cargo-insta
        run: cargo install cargo-insta --version 1.47.2 --locked

      - name: Verify committed snapshots
        run: cargo insta test --workspace --check

  codex-review:
    name: Codex Structured Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      CODEX_MODEL: ${{ vars.CODEX_MODEL || 'gpt-5.4' }}
      CODEX_REVIEW_EFFORT: ${{ vars.CODEX_REVIEW_EFFORT || 'high' }}
      CODEX_REVIEW_BLOCK_ON_INCORRECT: ${{ vars.CODEX_REVIEW_BLOCK_ON_INCORRECT || 'false' }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPOSITORY: ${{ github.repository }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
    steps:
      - name: Check review preconditions
        id: preflight
        env:
          HAS_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY != '' && 'true' || 'false' }}
          IS_DRAFT: ${{ github.event.pull_request.draft && 'true' || 'false' }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          should_run=true
          reason="ready"

          if [ "$HAS_OPENAI_KEY" != "true" ]; then
            should_run=false
            reason="OPENAI_API_KEY is not configured"
          elif [ "$IS_DRAFT" = "true" ]; then
            should_run=false
            reason="draft pull requests are skipped"
          elif [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            should_run=false
            reason="fork pull requests do not receive repository secrets"
          fi

          echo "should_run=$should_run" >>"$GITHUB_OUTPUT"
          echo "reason=$reason" >>"$GITHUB_OUTPUT"
          printf 'Codex review %s: %s\n' "$([ "$should_run" = true ] && echo enabled || echo skipped)" "$reason" >>"$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Checkout pull request merge commit
        if: steps.preflight.outputs.should_run == 'true'
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Fetch base and head refs
        if: steps.preflight.outputs.should_run == 'true'
        run: |
          set -euxo pipefail
          git fetch --no-tags origin \
            "$BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"
        shell: bash

      - name: Build Codex review prompt
        if: steps.preflight.outputs.should_run == 'true'
        run: |
          set -euo pipefail

          cp .github/codex/review_prompt.md codex-prompt.md

          changed_files="$(git --no-pager diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          guide_list_file="$(mktemp)"

          review_lenses=""
          case "$changed_files" in
            *crates/au-kpis-db/*|*infra/migrations/*)
              review_lenses="${review_lenses}\n- Database lens: protect hypertable correctness, query safety, reversibility, revision semantics, and observations_latest behavior."
              echo ".github/codex/guides/db.md" >>"$guide_list_file"
              ;;
          esac
          case "$changed_files" in
            *crates/au-kpis-loader/*|*crates/au-kpis-ingestion-core/*|*crates/au-kpis-queue/*|*crates/bins/au-kpis-ingestion/*|*crates/bins/au-kpis-scheduler/*)
              review_lenses="${review_lenses}\n- Ingestion lens: protect streaming, idempotency, raw artifact provenance, adapter/DB separation, retry behavior, and revision ordering."
              echo ".github/codex/guides/ingestion.md" >>"$guide_list_file"
              ;;
          esac
          case "$changed_files" in
            *crates/au-kpis-adapter/*|*crates/adapters/*|*crates/au-kpis-pdf-client/*)
              review_lenses="${review_lenses}\n- Adapter lens: protect parser correctness, source artifact linkage, format-drift safety, and adapter abstraction boundaries."
              echo ".github/codex/guides/adapters.md" >>"$guide_list_file"
              ;;
          esac
          case "$changed_files" in
            *crates/au-kpis-domain/*)
              review_lenses="${review_lenses}\n- Domain lens: protect typed boundaries, schema stability, and the canonical series/observation model."
              echo ".github/codex/guides/domain.md" >>"$guide_list_file"
              ;;
          esac
          case "$changed_files" in
            *crates/au-kpis-api-http/*|*crates/au-kpis-openapi/*|*packages/sdk/*|*packages/sdk-generated/*)
              review_lenses="${review_lenses}\n- API lens: protect OpenAPI parity, response compatibility, SDK regeneration expectations, and attribution in outward-facing payloads."
              echo ".github/codex/guides/api-sdk.md" >>"$guide_list_file"
              ;;
          esac
          case "$changed_files" in
            *apps/web/*)
              review_lenses="${review_lenses}\n- Frontend lens: protect explorer/client correctness and required E2E plus accessibility coverage."
              echo ".github/codex/guides/frontend.md" >>"$guide_list_file"
              ;;
          esac
          case "$changed_files" in
            *.github/workflows/*|*AGENTS.md|*Spec.md)
              review_lenses="${review_lenses}\n- CI/spec lens: verify that repo policy and documented CI behavior stay aligned."
              echo ".github/codex/guides/ci-spec.md" >>"$guide_list_file"
              ;;
          esac

          sort -u "$guide_list_file" -o "$guide_list_file"

          {
            echo ""
            echo "Repository: ${REPOSITORY}"
            echo "Pull Request #: ${PR_NUMBER}"
            echo "Base ref: ${BASE_REF}"
            echo "Head ref: ${HEAD_REF}"
            echo "Base SHA: ${BASE_SHA}"
            echo "Head SHA: ${HEAD_SHA}"
            echo ""
            echo "Pull request title:"
            printf '%s\n' "${PR_TITLE}"
            echo ""
            echo "Pull request body:"
            printf '%s\n' "${PR_BODY}"
            echo ""
            echo "Detected review lenses:"
            if [ -n "$review_lenses" ]; then
              printf '%b\n' "$review_lenses"
            else
              echo "- General lens: infer subsystem-specific risks from the changed files."
            fi
            echo ""
            echo "Included path-specific guides:"
            if [ -s "$guide_list_file" ]; then
              while IFS= read -r guide_path; do
                echo "- ${guide_path}"
              done <"$guide_list_file"
            else
              echo "- none"
            fi
            echo ""
            echo "Changed files:"
            git --no-pager diff --name-status "${BASE_SHA}" "${HEAD_SHA}"
            echo ""
            if [ -s "$guide_list_file" ]; then
              while IFS= read -r guide_path; do
                echo ""
                echo "--- BEGIN GUIDE: ${guide_path} ---"
                cat "$guide_path"
                echo "--- END GUIDE: ${guide_path} ---"
              done <"$guide_list_file"
              echo ""
            fi
            echo "Unified diff (context=5):"
            git --no-pager diff --unified=5 --stat=200 "${BASE_SHA}" "${HEAD_SHA}" > /tmp/diffstat.txt
            git --no-pager diff --unified=5 "${BASE_SHA}" "${HEAD_SHA}" > /tmp/full.diff
            cat /tmp/diffstat.txt
            echo ""
            cat /tmp/full.diff
          } >>codex-prompt.md

          rm -f "$guide_list_file"
        shell: bash

      - name: Run Codex structured review
        if: steps.preflight.outputs.should_run == 'true'
        id: run-codex
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: codex-prompt.md
          output-schema-file: .github/codex/output-schema.json
          output-file: codex-output.json
          model: ${{ env.CODEX_MODEL }}
          effort: ${{ env.CODEX_REVIEW_EFFORT }}
          sandbox: read-only
          safety-strategy: drop-sudo

      - name: Inspect structured Codex output
        if: steps.preflight.outputs.should_run == 'true' && always()
        run: |
          set -euo pipefail

          if [ -s codex-output.json ]; then
            jq '.' codex-output.json
          else
            echo "Codex output file missing"
            if [ "${CODEX_REVIEW_BLOCK_ON_INCORRECT}" = "true" ]; then
              echo "Codex blocking mode is enabled; missing review output fails the job."
              exit 1
            fi
            echo "Codex review is advisory; continuing without review output."
          fi
        shell: bash

      - name: Remove prior Codex review comments
        if: steps.preflight.outputs.should_run == 'true' && always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          inline_comments_url="https://api.github.com/repos/${REPOSITORY}/pulls/${PR_NUMBER}/comments?per_page=100"
          issue_comments_url="https://api.github.com/repos/${REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100"

          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$inline_comments_url" |
            jq -r '.[] | select(.body | contains("<!-- codex-review-inline -->")) | .id' |
            while IFS= read -r comment_id; do
              curl -fsSL \
                -X DELETE \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${REPOSITORY}/pulls/comments/${comment_id}"
            done

          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$issue_comments_url" |
            jq -r '.[] | select(
              (.body | contains("<!-- codex-review-summary -->"))
              or (.body | contains("<!-- codex-review-inline-fallback -->"))
            ) | .id' |
            while IFS= read -r comment_id; do
              curl -fsSL \
                -X DELETE \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${REPOSITORY}/issues/comments/${comment_id}"
            done
        shell: bash

      - name: Publish inline review comments
        if: steps.preflight.outputs.should_run == 'true' && always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REVIEW_JSON: codex-output.json
        run: |
          set -euo pipefail

          if [ ! -s "$REVIEW_JSON" ]; then
            echo "No Codex output file present; skipping comment publishing."
            exit 0
          fi

          findings_count=$(jq '.findings | length' "$REVIEW_JSON")
          if [ "$findings_count" -eq 0 ]; then
            echo "Codex returned no findings; skipping inline comments."
            exit 0
          fi

          # Each finding produces a pair of payloads:
          #   .inline   — the standard inline review-comment payload
          #   .fallback — an issue-comment payload posted only when the
          #               inline POST is rejected (typically 422:
          #               "pull_request_review_thread.line could not be
          #               resolved", which happens when Codex points at
          #               a line outside the PR's diff hunks).
          # Emitting both up-front keeps jq out of the retry path.
          jq -c \
            --arg commit "$HEAD_SHA" \
            --arg workspace "${GITHUB_WORKSPACE%/}/" '
            .findings[]
            | (.code_location.absolute_file_path | sub("^" + $workspace; "")) as $relpath
            | (
                "**[" + .category + "][" + .subsystem + "] " + .title + "**\n\n"
                + .body
                + "\n\nInvariant: `" + .invariant + "`"
                + "\nSuggested test layer: `" + .suggested_test_layer + "`"
                + "\nConfidence: " + (.confidence_score | tostring)
                + "\nPriority: P" + (.priority | tostring)
              ) as $core
            | (
                if .code_location.line_range.start == .code_location.line_range.end
                then (.code_location.line_range.end | tostring)
                else (.code_location.line_range.start | tostring) + "-" + (.code_location.line_range.end | tostring)
                end
              ) as $range
            | {
                inline: ({
                  body: ("<!-- codex-review-inline -->\n" + $core),
                  commit_id: $commit,
                  path: $relpath,
                  line: .code_location.line_range.end,
                  side: "RIGHT",
                  start_line: (if .code_location.line_range.start != .code_location.line_range.end then .code_location.line_range.start else null end),
                  start_side: (if .code_location.line_range.start != .code_location.line_range.end then "RIGHT" else null end)
                } | with_entries(select(.value != null))),
                fallback: {
                  body: ("<!-- codex-review-inline-fallback -->\n"
                    + "_Inline comment could not attach to the PR diff — falling back to a thread comment._\n\n"
                    + "📎 `" + $relpath + ":" + $range + "`\n\n"
                    + $core)
                }
              }' "$REVIEW_JSON" > findings.jsonl

          while IFS= read -r combined; do
            inline_payload=$(jq -c '.inline' <<<"$combined")
            fallback_payload=$(jq -c '.fallback' <<<"$combined")

            response_file="$(mktemp)"
            status_code=$(curl -sS \
              -o "$response_file" \
              -w '%{http_code}' \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/pulls/${PR_NUMBER}/comments" \
              -d "$inline_payload")

            if [ "${status_code}" -lt 200 ] || [ "${status_code}" -ge 300 ]; then
              echo "::warning::Inline Codex review comment rejected (HTTP ${status_code}); falling back to a thread comment."
              cat "$response_file"

              fallback_response="$(mktemp)"
              fallback_status=$(curl -sS \
                -o "$fallback_response" \
                -w '%{http_code}' \
                -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
                -d "$fallback_payload")
              if [ "${fallback_status}" -lt 200 ] || [ "${fallback_status}" -ge 300 ]; then
                echo "::warning::Fallback thread comment also failed (HTTP ${fallback_status})."
                cat "$fallback_response"
              fi
              rm -f "$fallback_response"
            fi

            rm -f "$response_file"
          done < findings.jsonl
        shell: bash

      - name: Publish overall summary comment
        if: steps.preflight.outputs.should_run == 'true' && always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REVIEW_JSON: codex-output.json
        run: |
          set -euo pipefail

          if [ ! -s "$REVIEW_JSON" ]; then
            echo "Codex output missing; skipping summary."
            exit 0
          fi

          overall_state=$(jq -r '.overall_correctness' "$REVIEW_JSON")
          overall_body=$(jq -r '.overall_explanation' "$REVIEW_JSON")
          confidence=$(jq -r '.overall_confidence_score' "$REVIEW_JSON")
          findings_count=$(jq '.findings | length' "$REVIEW_JSON")
          primary_risk_areas=$(jq -r '.primary_risk_areas | map("`" + . + "`") | join(", ")' "$REVIEW_JSON")
          spec_update_required=$(jq -r '.spec_update_required' "$REVIEW_JSON")
          spec_update_reason=$(jq -r '.spec_update_reason' "$REVIEW_JSON")
          category_breakdown=$(jq -r '
            .findings
            | group_by(.category)
            | map("- `" + .[0].category + "`: " + (length | tostring))
            | join("\n")
          ' "$REVIEW_JSON")
          subsystem_breakdown=$(jq -r '
            .findings
            | group_by(.subsystem)
            | map("- `" + .[0].subsystem + "`: " + (length | tostring))
            | join("\n")
          ' "$REVIEW_JSON")

          comment_body=$(
            jq -n \
              --arg verdict "$overall_state" \
              --arg confidence "$confidence" \
              --arg explanation "$overall_body" \
              --arg findings "$findings_count" \
              --arg risks "$primary_risk_areas" \
              --arg spec_required "$spec_update_required" \
              --arg spec_reason "$spec_update_reason" \
              --arg categories "$category_breakdown" \
              --arg subsystems "$subsystem_breakdown" \
              '{
                body: (
                  "<!-- codex-review-summary -->\n**Codex automated review**\n\n"
                  + "Verdict: " + $verdict + "\n"
                  + "Confidence: " + $confidence + "\n"
                  + "Findings: " + $findings + "\n"
                  + "Primary risk areas: " + (if $risks != "" then $risks else "none" end) + "\n"
                  + "Spec update required: " + $spec_required + (if $spec_required == "true" and $spec_reason != "" then " (" + $spec_reason + ")" else "" end) + "\n\n"
                  + (if $categories != "" then "**Category Breakdown**\n" + $categories + "\n\n" else "" end)
                  + (if $subsystems != "" then "**Subsystem Breakdown**\n" + $subsystems + "\n\n" else "" end)
                  + $explanation
                )
              }'
          )

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
            -d "$comment_body"
        shell: bash

      - name: Enforce Codex verdict
        if: steps.preflight.outputs.should_run == 'true' && always()
        env:
          REVIEW_JSON: codex-output.json
        run: |
          set -euo pipefail

          if [ "${CODEX_REVIEW_BLOCK_ON_INCORRECT}" != "true" ]; then
            echo "Blocking mode disabled; leaving Codex review advisory."
            exit 0
          fi

          if [ ! -s "$REVIEW_JSON" ]; then
            echo "Codex output missing and blocking mode is enabled."
            exit 1
          fi

          verdict=$(jq -r '.overall_correctness' "$REVIEW_JSON")
          if [ "$verdict" = "patch is incorrect" ]; then
            echo "Codex marked this patch incorrect and blocking mode is enabled."
            exit 1
          fi
        shell: bash

  # Single required-status-check gate. Branch protection points at
  # `CI OK` and this job aggregates every upstream job's result, so
  # adding or renaming jobs never forces a branch-protection edit —
  # just keep the list in `needs:` current.
  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    needs:
      - rust-check
      - typescript
      - lint-format
      - openapi
      - supply-chain
      - container-security
      - smoke
      - bench
      - nextest
      - coverage
      - contract
      - snapshots
      - codex-review
    if: always()
    steps:
      - name: Enforce required job results
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          echo "Upstream job results:"
          jq -r 'to_entries[] | "  \(.key): \(.value.result)"' <<<"$NEEDS"

          # `skipped` is allowed — the upstream preflight deliberately
          # skips Codex for draft PRs, forks, and repos without
          # OPENAI_API_KEY, and we don't want those escape hatches to
          # block merges. `failure` or `cancelled` fails the gate.
          bad=$(jq -r '
            to_entries
            | map(select(.value.result == "failure" or .value.result == "cancelled"))
            | map(.key)
            | join(", ")
          ' <<<"$NEEDS")

          if [ -n "$bad" ]; then
            echo "::error::required checks failed or were cancelled: $bad"
            exit 1
          fi
        shell: bash
