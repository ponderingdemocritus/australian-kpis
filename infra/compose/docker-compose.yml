name: australian-kpis

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: au_kpis
      POSTGRES_USER: au_kpis
      POSTGRES_PASSWORD: au_kpis
    ports:
      - "127.0.0.1:54320:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U au_kpis -d au_kpis"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:63790:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: au_kpis_minio
      MINIO_ROOT_PASSWORD: au_kpis_minio_dev_password
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/ready >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  pdf-extractor:
    image: python:3.12-slim
    init: true
    command: ["python", "/app/pdf-extractor-stub.py"]
    ports:
      - "127.0.0.1:8010:8000"
    volumes:
      - ./pdf-extractor-stub.py:/app/pdf-extractor-stub.py:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ../..
      dockerfile: infra/docker/au-kpis-api.Dockerfile
      target: local
    environment:
      AU_KPIS_HTTP__BIND: 0.0.0.0:3000
      AU_KPIS_DATABASE__URL: postgres://au_kpis:au_kpis@postgres:5432/au_kpis
      AU_KPIS_CACHE__URL: redis://redis:6379
      AU_KPIS_TELEMETRY__SERVICE_NAME: au-kpis-api
      AU_KPIS_TELEMETRY__LOG_FORMAT: pretty
      AU_KPIS_TELEMETRY__LOG_LEVEL: info
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      pdf-extractor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  postgres-data:
  redis-data:
  minio-data:
