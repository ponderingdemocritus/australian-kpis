[profile.default]
retries = { backoff = "fixed", count = 2, delay = "1s" }
status-level = "retry"
final-status-level = "flaky"
failure-output = "immediate-final"
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.default.junit]
path = "junit.xml"
store-failure-output = true
